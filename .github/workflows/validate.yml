name: Validate Skill

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Validate markdown skill structure
        run: npm test

      - name: Validate installer syntax
        run: npm run lint:shell
